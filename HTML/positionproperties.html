<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 2000px;
        }
        .sticky{
            position: sticky;
            top: 20px;
            background-color: red;
            padding: 50px;
            font-size: 20px;
        }
        .fixed{
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: blue;
            padding: 50px;
            font-size: 20px;
        }
        .static{
            position: static;
            background-color: green;
            padding: 50px;
            font-size: 20px;
        }
        .absolute{
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: yellow;
            padding: 50px;
            font-size: 20px;
        }
        .relative{
            position: relative;
            top: 20px;
            left: 20px;
            background-color: orange;
            padding: 50px;
            font-size: 20px;
        }

    </style>
</head>
<body>
    <h1>CSS position properties</h1>
    <div class="sticky">sticky</div>
    <div class="fixed"> <h2>fixed</h2></div>
    <div class="static"><h2>static</h2></div>
    <div class="absolute"><h2>absolute</h2></div>
    <div class="relative"><h2>relative</h2></div>
    
</body>
</html>
